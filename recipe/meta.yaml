package:
  name: DFTbox
  version: "0.1.0"

source:
  path: ..

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  build:
    - python
    - pip
    - setuptools
    - wheel
  host:
    - python
  run:
    - python
    - numpy >=1.26
    - matplotlib
    - scipy
    - h5py
    - pyyaml
    
about:
  summary: Toolkit for managing and postprocessing VASP DFT calculations on HPC/SLURM clusters
  license: MIT

